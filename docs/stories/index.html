<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Library — Auto-Writer</title>
  <meta name="description" content="Your Auto-Writer library: organize, edit, and manage your stories in folders — stored in your browser." />
  <style>
    :root {
      --bg: #0f1117; --panel: #171a23; --panel2: #1f2432; --text: #e8eaf0; --muted: #9aa3b2;
      --accent: #7c9cff; --danger: #ff7b86; --border: #262b38; --shadow: rgba(0,0,0,.35);
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f7f8fb; --panel: #ffffff; --panel2: #f0f2f7; --text: #1a1d26; --muted: #5a6270;
        --accent: #3a5bd9; --danger: #d23a4b; --border: #e2e5ec; --shadow: rgba(20,30,60,.12);
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.55;
    }
    button { font: inherit; cursor: pointer; }
    .topbar {
      display: flex; align-items: center; gap: 1rem; padding: .9rem 1.25rem;
      border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 5;
    }
    .topbar a.home { color: var(--accent); text-decoration: none; font-size: .95rem; }
    .topbar h1 { font-size: 1.15rem; margin: 0; letter-spacing: -.01em; }
    .grow { flex: 1; }
    .btn {
      background: var(--panel2); color: var(--text); border: 1px solid var(--border);
      border-radius: 8px; padding: .45rem .8rem; font-size: .88rem;
    }
    .btn:hover { border-color: var(--accent); }
    .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn.small { padding: .25rem .55rem; font-size: .8rem; }
    .btn.danger:hover { border-color: var(--danger); color: var(--danger); }

    .layout { display: grid; grid-template-columns: 260px 1fr; min-height: calc(100vh - 56px); }
    @media (max-width: 720px) { .layout { grid-template-columns: 1fr; } .sidebar { border-right: none; border-bottom: 1px solid var(--border); } }

    .sidebar { border-right: 1px solid var(--border); padding: 1rem .75rem; }
    .side-head { display: flex; align-items: center; justify-content: space-between; padding: 0 .35rem .5rem; }
    .side-head span { color: var(--muted); font-size: .78rem; text-transform: uppercase; letter-spacing: .06em; }
    .folder {
      display: flex; align-items: center; gap: .5rem; padding: .5rem .55rem; border-radius: 8px;
      cursor: pointer; user-select: none; position: relative;
    }
    .folder:hover { background: var(--panel); }
    .folder.active { background: var(--panel); border: 1px solid var(--accent); padding: calc(.5rem - 1px) calc(.55rem - 1px); }
    .folder .fname { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .folder .count { color: var(--muted); font-size: .8rem; }
    .folder .factions { display: none; gap: .15rem; }
    .folder:hover .factions, .folder.active .factions { display: flex; }
    .icon-btn { background: none; border: none; color: var(--muted); padding: .1rem .3rem; border-radius: 6px; font-size: .85rem; }
    .icon-btn:hover { color: var(--accent); background: var(--panel2); }
    .icon-btn.del:hover { color: var(--danger); }

    .main { padding: 1.25rem 1.5rem; }
    .main-head { display: flex; align-items: center; gap: .75rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .main-head h2 { margin: 0; font-size: 1.35rem; letter-spacing: -.01em; }
    .main-head .sub { color: var(--muted); font-size: .9rem; }

    .cards { display: grid; gap: .8rem; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); }
    .card {
      background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 1rem 1.1rem;
      display: flex; flex-direction: column; gap: .55rem;
    }
    .card h3 { margin: 0; font-size: 1.08rem; cursor: pointer; }
    .card h3:hover { color: var(--accent); }
    .card .excerpt { color: var(--muted); font-size: .9rem; flex: 1; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .card .row { display: flex; align-items: center; gap: .4rem; flex-wrap: wrap; }
    .card .meta { color: var(--muted); font-size: .78rem; }
    .card .spacer { flex: 1; }
    .card select { background: var(--panel2); color: var(--text); border: 1px solid var(--border); border-radius: 7px; padding: .2rem .35rem; font-size: .8rem; }

    .empty { border: 1px dashed var(--border); border-radius: 12px; padding: 3rem 1.5rem; text-align: center; color: var(--muted); }

    /* Editor */
    .editor { max-width: 820px; }
    .editor .titleinput {
      width: 100%; font-size: 1.6rem; font-weight: 700; background: transparent; color: var(--text);
      border: none; border-bottom: 1px solid var(--border); padding: .35rem 0 .6rem; margin-bottom: .8rem; letter-spacing: -.01em;
    }
    .editor .titleinput:focus { outline: none; border-bottom-color: var(--accent); }
    .editor .controls { display: flex; align-items: center; gap: .6rem; flex-wrap: wrap; margin-bottom: .9rem; }
    .editor label { color: var(--muted); font-size: .82rem; }
    .editor select { background: var(--panel2); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: .35rem .5rem; font-size: .85rem; }
    .editor textarea {
      width: 100%; min-height: 55vh; resize: vertical; background: var(--panel); color: var(--text);
      border: 1px solid var(--border); border-radius: 12px; padding: 1.1rem 1.2rem; font-size: 1.05rem; line-height: 1.7;
      font-family: Georgia, "Times New Roman", serif;
    }
    .editor textarea:focus { outline: none; border-color: var(--accent); }
    .editor .barbottom { display: flex; align-items: center; gap: .6rem; margin-top: .8rem; flex-wrap: wrap; }
    .saved { color: var(--muted); font-size: .82rem; }
    .toast {
      position: fixed; bottom: 1.25rem; left: 50%; transform: translateX(-50%);
      background: var(--panel); border: 1px solid var(--accent); color: var(--text);
      padding: .55rem 1rem; border-radius: 10px; box-shadow: 0 6px 24px var(--shadow); font-size: .9rem;
      opacity: 0; pointer-events: none; transition: opacity .2s ease; z-index: 20;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="topbar">
    <a class="home" href="../index.html">← Auto-Writer</a>
    <h1>Your Library</h1>
    <span class="grow"></span>
    <a class="btn primary" href="../compose/index.html" style="text-decoration:none">✍️ Write a story</a>
    <button class="btn" id="exportAll" title="Download a backup of your whole library">Backup</button>
    <button class="btn" id="importBtn" title="Restore from a backup file">Restore</button>
    <input type="file" id="importFile" accept="application/json" hidden />
  </div>

  <div class="layout">
    <aside class="sidebar">
      <div class="side-head"><span>Folders</span><button class="btn small" id="newFolder">+ Folder</button></div>
      <div id="folders"></div>
    </aside>

    <main class="main">
      <div id="listView">
        <div class="main-head">
          <h2 id="folderTitle">All stories</h2>
          <span class="sub" id="folderSub"></span>
          <span class="grow"></span>
          <button class="btn primary" id="newStory">+ New story</button>
        </div>
        <div id="cards" class="cards"></div>
        <div id="emptyState" class="empty" hidden></div>
      </div>

      <div id="editView" class="editor" hidden>
        <button class="btn small" id="backBtn">← Back to list</button>
        <input class="titleinput" id="edTitle" placeholder="Untitled story" />
        <div class="controls">
          <label>Reading level
            <select id="edLevel">
              <option value="6">6</option>
              <option value="10" selected>10</option>
              <option value="12">12</option>
              <option value="doctorate">doctorate</option>
            </select>
          </label>
          <label>Folder
            <select id="edFolder"></select>
          </label>
          <span class="grow"></span>
          <span class="saved" id="wordCount">0 words</span>
        </div>
        <textarea id="edBody" placeholder="Write your story here, or paste what Auto-Writer generated…"></textarea>
        <div class="barbottom">
          <button class="btn primary" id="saveBtn">Save</button>
          <button class="btn" id="downloadTxt">Download .txt</button>
          <button class="btn danger" id="deleteBtn">Delete story</button>
          <span class="grow"></span>
          <span class="saved" id="savedAt"></span>
        </div>
      </div>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script>
  (function () {
    "use strict";
    var KEY = "autowriter.library.v1";
    var UNFILED = "__unfiled__";
    var ALL = "__all__";

    // ---------- storage ----------
    function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }
    function load() {
      try {
        var raw = localStorage.getItem(KEY);
        if (!raw) return { folders: [], stories: [] };
        var d = JSON.parse(raw);
        if (!d || typeof d !== "object") return { folders: [], stories: [] };
        d.folders = Array.isArray(d.folders) ? d.folders : [];
        d.stories = Array.isArray(d.stories) ? d.stories : [];
        return d;
      } catch (e) { return { folders: [], stories: [] }; }
    }
    var db = load();
    function save() {
      try { localStorage.setItem(KEY, JSON.stringify(db)); }
      catch (e) { toast("Couldn't save — browser storage may be full."); }
    }

    // ---------- helpers ----------
    var $ = function (id) { return document.getElementById(id); };
    function esc(s) {
      return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
        return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
      });
    }
    function wordCount(t) { var m = String(t || "").trim().match(/\S+/g); return m ? m.length : 0; }
    function fmtDate(ts) {
      if (!ts) return "";
      try { return new Date(ts).toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" }); }
      catch (e) { return ""; }
    }
    var toastTimer;
    function toast(msg) {
      var t = $("toast"); t.textContent = msg; t.classList.add("show");
      clearTimeout(toastTimer); toastTimer = setTimeout(function () { t.classList.remove("show"); }, 2200);
    }
    function folderName(id) {
      if (id === ALL) return "All stories";
      if (id == null || id === UNFILED) return "Unfiled";
      var f = db.folders.find(function (x) { return x.id === id; });
      return f ? f.name : "Unfiled";
    }
    function storiesIn(folderId) {
      return db.stories.filter(function (s) {
        if (folderId === ALL) return true;
        if (folderId === UNFILED || folderId == null) return s.folderId == null;
        return s.folderId === folderId;
      }).sort(function (a, b) { return (b.updatedAt || 0) - (a.updatedAt || 0); });
    }

    // ---------- state ----------
    var current = ALL;      // selected folder id (or ALL/UNFILED)
    var editingId = null;   // story id being edited, or null for list view

    // ---------- render sidebar ----------
    function renderFolders() {
      var host = $("folders");
      var items = [];
      items.push(folderRow(ALL, "All stories", db.stories.length, false));
      items.push(folderRow(UNFILED, "Unfiled", storiesIn(UNFILED).length, false));
      db.folders.forEach(function (f) {
        items.push(folderRow(f.id, f.name, storiesIn(f.id).length, true));
      });
      host.innerHTML = items.join("");
      // wire events
      Array.prototype.forEach.call(host.querySelectorAll(".folder"), function (el) {
        var id = el.getAttribute("data-id");
        el.addEventListener("click", function (e) {
          if (e.target.closest(".icon-btn")) return;
          current = id; editingId = null; render();
        });
      });
      Array.prototype.forEach.call(host.querySelectorAll(".icon-btn.rename"), function (el) {
        el.addEventListener("click", function () { renameFolder(el.getAttribute("data-id")); });
      });
      Array.prototype.forEach.call(host.querySelectorAll(".icon-btn.del"), function (el) {
        el.addEventListener("click", function () { deleteFolder(el.getAttribute("data-id")); });
      });
    }
    function folderRow(id, name, count, editable) {
      var active = (id === current) ? " active" : "";
      var actions = editable
        ? '<span class="factions">' +
            '<button class="icon-btn rename" data-id="' + esc(id) + '" title="Rename folder">✎</button>' +
            '<button class="icon-btn del" data-id="' + esc(id) + '" title="Delete folder">🗑</button>' +
          '</span>'
        : '';
      return '<div class="folder' + active + '" data-id="' + esc(id) + '">' +
        '<span class="fname">' + esc(name) + '</span>' +
        actions +
        '<span class="count">' + count + '</span>' +
      '</div>';
    }

    // ---------- folder actions ----------
    function newFolder() {
      var name = (prompt("New folder name:", "") || "").trim();
      if (!name) return;
      db.folders.push({ id: uid(), name: name });
      save(); render(); toast("Folder created.");
    }
    function renameFolder(id) {
      var f = db.folders.find(function (x) { return x.id === id; });
      if (!f) return;
      var name = (prompt("Rename folder:", f.name) || "").trim();
      if (!name) return;
      f.name = name; save(); render(); toast("Folder renamed.");
    }
    function deleteFolder(id) {
      var f = db.folders.find(function (x) { return x.id === id; });
      if (!f) return;
      var n = storiesIn(id).length;
      var msg = n
        ? 'Delete folder "' + f.name + '"? Its ' + n + ' story(ies) will move to Unfiled (not deleted).'
        : 'Delete folder "' + f.name + '"?';
      if (!confirm(msg)) return;
      db.stories.forEach(function (s) { if (s.folderId === id) s.folderId = null; });
      db.folders = db.folders.filter(function (x) { return x.id !== id; });
      if (current === id) current = ALL;
      save(); render(); toast("Folder deleted.");
    }

    // ---------- story actions ----------
    function newStory() {
      var folderId = (current === ALL || current === UNFILED) ? null : current;
      var s = { id: uid(), title: "Untitled story", level: "10", body: "", folderId: folderId,
                createdAt: Date.now(), updatedAt: Date.now() };
      db.stories.push(s); save();
      openEditor(s.id);
    }
    function deleteStory(id) {
      var s = db.stories.find(function (x) { return x.id === id; });
      if (!s) return;
      if (!confirm('Delete "' + (s.title || "Untitled") + '"? This cannot be undone.')) return;
      db.stories = db.stories.filter(function (x) { return x.id !== id; });
      editingId = null; save(); render(); toast("Story deleted.");
    }
    function renameStory(id) {
      var s = db.stories.find(function (x) { return x.id === id; });
      if (!s) return;
      var t = (prompt("Story title:", s.title || "") || "").trim();
      if (!t) return;
      s.title = t; s.updatedAt = Date.now(); save(); render(); toast("Renamed.");
    }
    function moveStory(id, folderId) {
      var s = db.stories.find(function (x) { return x.id === id; });
      if (!s) return;
      s.folderId = (folderId === UNFILED) ? null : folderId;
      s.updatedAt = Date.now(); save(); render(); toast("Moved to " + folderName(s.folderId) + ".");
    }

    // ---------- list view ----------
    function renderList() {
      $("listView").hidden = false;
      $("editView").hidden = true;
      $("folderTitle").textContent = folderName(current);
      var list = storiesIn(current);
      $("folderSub").textContent = list.length + (list.length === 1 ? " story" : " stories");

      var cards = $("cards"), empty = $("emptyState");
      if (!list.length) {
        cards.innerHTML = "";
        empty.hidden = false;
        empty.innerHTML = 'No stories here yet. <a href="../compose/index.html">Write a story from a prompt</a>, ' +
          'or click <strong>+ New story</strong> to start a blank one.';
        return;
      }
      empty.hidden = true;
      var folderOpts = moveOptions();
      cards.innerHTML = list.map(function (s) {
        var opts = folderOpts.replace('value="' + (s.folderId == null ? UNFILED : s.folderId) + '"',
                                      'value="' + (s.folderId == null ? UNFILED : s.folderId) + '" selected');
        return '<div class="card" data-id="' + esc(s.id) + '">' +
          '<h3 data-act="open">' + esc(s.title || "Untitled story") + '</h3>' +
          '<div class="excerpt">' + esc(s.body ? s.body.slice(0, 240) : "No text yet.") + '</div>' +
          '<div class="row meta"><span>Level ' + esc(s.level || "10") + '</span><span>·</span>' +
            '<span>' + wordCount(s.body) + ' words</span><span>·</span><span>' + esc(fmtDate(s.updatedAt)) + '</span></div>' +
          '<div class="row">' +
            '<button class="btn small" data-act="open">Edit</button>' +
            '<button class="btn small" data-act="rename">Rename</button>' +
            '<select data-act="move" title="Move to folder">' + opts + '</select>' +
            '<span class="spacer"></span>' +
            '<button class="btn small danger" data-act="delete">Delete</button>' +
          '</div>' +
        '</div>';
      }).join("");

      Array.prototype.forEach.call(cards.querySelectorAll(".card"), function (card) {
        var id = card.getAttribute("data-id");
        card.addEventListener("click", function (e) {
          var act = e.target.getAttribute("data-act");
          if (act === "open") openEditor(id);
          else if (act === "rename") renameStory(id);
          else if (act === "delete") deleteStory(id);
        });
        var sel = card.querySelector('select[data-act="move"]');
        if (sel) sel.addEventListener("change", function () { moveStory(id, sel.value); });
      });
    }
    function moveOptions() {
      var opts = '<option value="' + UNFILED + '">Unfiled</option>';
      db.folders.forEach(function (f) { opts += '<option value="' + esc(f.id) + '">' + esc(f.name) + '</option>'; });
      return opts;
    }

    // ---------- editor ----------
    function openEditor(id) { editingId = id; render(); }
    function renderEditor() {
      var s = db.stories.find(function (x) { return x.id === editingId; });
      if (!s) { editingId = null; renderList(); return; }
      $("listView").hidden = true;
      $("editView").hidden = false;
      $("edTitle").value = s.title || "";
      $("edLevel").value = s.level || "10";
      $("edBody").value = s.body || "";
      $("savedAt").textContent = s.updatedAt ? "Last saved " + fmtDate(s.updatedAt) : "";
      $("wordCount").textContent = wordCount(s.body) + " words";
      // folder select
      var fsel = $("edFolder");
      fsel.innerHTML = moveOptions();
      fsel.value = (s.folderId == null) ? UNFILED : s.folderId;
    }
    function collectEditor() {
      var s = db.stories.find(function (x) { return x.id === editingId; });
      if (!s) return null;
      s.title = $("edTitle").value.trim() || "Untitled story";
      s.level = $("edLevel").value;
      s.body = $("edBody").value;
      s.folderId = ($("edFolder").value === UNFILED) ? null : $("edFolder").value;
      s.updatedAt = Date.now();
      return s;
    }
    function saveEditor(silent) {
      var s = collectEditor(); if (!s) return;
      save();
      $("savedAt").textContent = "Last saved just now";
      if (!silent) toast("Saved.");
    }

    // ---------- backup / restore ----------
    function download(filename, text, type) {
      var blob = new Blob([text], { type: type || "text/plain" });
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url; a.download = filename; document.body.appendChild(a); a.click();
      document.body.removeChild(a); setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
    }
    function exportAll() {
      download("auto-writer-library.json", JSON.stringify(db, null, 2), "application/json");
      toast("Backup downloaded.");
    }
    function importAll(file) {
      var reader = new FileReader();
      reader.onload = function () {
        try {
          var d = JSON.parse(reader.result);
          if (!d || !Array.isArray(d.stories)) throw new Error("bad");
          if (!confirm("Restore this backup? It replaces your current library.")) return;
          db = { folders: Array.isArray(d.folders) ? d.folders : [], stories: d.stories };
          current = ALL; editingId = null; save(); render(); toast("Library restored.");
        } catch (e) { toast("That file isn't a valid library backup."); }
      };
      reader.readAsText(file);
    }
    function slugify(t) {
      return String(t || "story").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "").slice(0, 60) || "story";
    }

    // ---------- render ----------
    function render() {
      renderFolders();
      if (editingId) renderEditor(); else renderList();
    }

    // ---------- events ----------
    $("newFolder").addEventListener("click", newFolder);
    $("newStory").addEventListener("click", newStory);
    $("backBtn").addEventListener("click", function () { saveEditor(true); editingId = null; render(); });
    $("saveBtn").addEventListener("click", function () { saveEditor(false); });
    $("deleteBtn").addEventListener("click", function () { if (editingId) deleteStory(editingId); });
    $("downloadTxt").addEventListener("click", function () {
      var s = collectEditor(); if (!s) return; save();
      download(slugify(s.title) + ".txt", (s.title || "Untitled") + "\n\n" + (s.body || ""), "text/plain");
    });
    $("edBody").addEventListener("input", function () { $("wordCount").textContent = wordCount($("edBody").value) + " words"; });
    $("edFolder").addEventListener("change", function () { saveEditor(true); });
    // autosave on typing (debounced) and when leaving the page
    var autosaveTimer;
    function scheduleAutosave() { clearTimeout(autosaveTimer); autosaveTimer = setTimeout(function () { if (editingId) saveEditor(true); }, 900); }
    $("edTitle").addEventListener("input", scheduleAutosave);
    $("edBody").addEventListener("input", scheduleAutosave);
    $("edLevel").addEventListener("change", function () { if (editingId) saveEditor(true); });
    window.addEventListener("beforeunload", function () { if (editingId) saveEditor(true); });

    $("exportAll").addEventListener("click", exportAll);
    $("importBtn").addEventListener("click", function () { $("importFile").click(); });
    $("importFile").addEventListener("change", function (e) { if (e.target.files[0]) importAll(e.target.files[0]); e.target.value = ""; });

    render();
  })();
  </script>
</body>
</html>
