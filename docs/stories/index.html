<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Story library — Auto-Writer</title>
  <meta name="description" content="Every story written by Auto-Writer." />
  <style>
    :root {
      --bg: #0f1117; --panel: #171a23; --text: #e8eaf0; --muted: #9aa3b2;
      --accent: #7c9cff; --border: #262b38;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f7f8fb; --panel: #ffffff; --text: #1a1d26; --muted: #5a6270;
        --accent: #3a5bd9; --border: #e2e5ec;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--text); line-height: 1.6;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .wrap { max-width: 760px; margin: 0 auto; padding: 3rem 1.5rem 5rem; }
    .bar a { color: var(--accent); text-decoration: none; font-size: .95rem; }
    h1 { font-size: 2.2rem; margin: 1rem 0 .35rem; letter-spacing: -.02em; }
    .sub { color: var(--muted); margin: 0 0 2rem; }
    ul { list-style: none; padding: 0; margin: 0; display: grid; gap: 1rem; }
    li a {
      display: block; background: var(--panel); border: 1px solid var(--border);
      border-radius: 12px; padding: 1.15rem 1.35rem; text-decoration: none; color: inherit;
      transition: border-color .15s ease, transform .15s ease;
    }
    li a:hover { border-color: var(--accent); transform: translateY(-2px); }
    .t { font-size: 1.2rem; font-weight: 600; margin: 0 0 .3rem; }
    .d { color: var(--muted); margin: 0 0 .7rem; font-size: .97rem; }
    .m { color: var(--muted); font-size: .82rem; display: flex; flex-wrap: wrap; gap: .5rem; }
    .m .pill { background: var(--bg); border: 1px solid var(--border); border-radius: 999px; padding: .1rem .6rem; }
    .empty { background: var(--panel); border: 1px dashed var(--border); border-radius: 12px; padding: 2.5rem 1.5rem; text-align: center; color: var(--muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <nav class="bar"><a href="../index.html">← Auto-Writer</a></nav>
    <h1>Story library</h1>
    <p class="sub">Every story Auto-Writer has published, newest first.</p>
    <ul id="list"></ul>
    <div id="empty" class="empty" hidden>No stories published yet. The first one will appear here automatically.</div>
  </div>

  <script>
    const esc = (s) => String(s == null ? "" : s).replace(/[&<>"']/g, c =>
      ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

    fetch("../stories.json", { cache: "no-store" })
      .then(r => r.ok ? r.json() : { stories: [] })
      .then(data => {
        const stories = (data && Array.isArray(data.stories)) ? data.stories.slice() : [];
        // Newest first: sort by date descending when present, otherwise keep file order reversed.
        stories.sort((a, b) => String(b.date || "").localeCompare(String(a.date || "")));
        const list = document.getElementById("list");
        if (!stories.length) { document.getElementById("empty").hidden = false; return; }
        list.innerHTML = stories.map(s => {
          const href = esc(s.slug ? s.slug + ".html" : "#");
          const meta = [
            s.level != null ? `<span class="pill">Level ${esc(s.level)}</span>` : "",
            s.words ? `<span class="pill">≈ ${esc(s.words)} words</span>` : "",
            s.date ? `<span class="pill">${esc(s.date)}</span>` : ""
          ].join("");
          return `<li><a href="${href}">
            <p class="t">${esc(s.title || "Untitled")}</p>
            ${s.description ? `<p class="d">${esc(s.description)}</p>` : ""}
            <div class="m">${meta}</div>
          </a></li>`;
        }).join("");
      })
      .catch(() => { document.getElementById("empty").hidden = false; });
  </script>
</body>
</html>
