<!doctype html>
<!--
  Auto-Writer story template.
  ===========================
  To publish a story, COPY this file to docs/stories/<slug>.html and replace every
  {{PLACEHOLDER}} token below. Do not leave any {{...}} tokens in a published file.

  Tokens:
    {{TITLE}}          Story title (plain text).
    {{DESCRIPTION}}    One-sentence summary for <meta> / social preview.
    {{READING_LEVEL}}  One of: 6, 10, 12, doctorate.
    {{WORD_COUNT}}     Approximate total word count, e.g. "8,000".
    {{DATE}}           Publish date, e.g. "2026-07-07".
    {{BODY}}           The story itself as HTML: one <p>…</p> per paragraph.
                       Keep chunk seams invisible — no "Chunk 2" markers.

  Also add a matching entry to docs/stories.json so the library page lists it.
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{TITLE}} — Auto-Writer</title>
  <meta name="description" content="{{DESCRIPTION}}" />
  <style>
    :root {
      --bg: #0f1117; --panel: #171a23; --text: #e8eaf0; --muted: #9aa3b2;
      --accent: #7c9cff; --border: #262b38;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f7f8fb; --panel: #ffffff; --text: #1a1d26; --muted: #5a6270;
        --accent: #3a5bd9; --border: #e2e5ec;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--text); line-height: 1.75;
      font-family: Georgia, "Times New Roman", serif;
    }
    .bar {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 720px; margin: 0 auto; padding: 1.5rem 1.5rem 0;
    }
    .bar a { color: var(--accent); text-decoration: none; font-size: .95rem; }
    .wrap { max-width: 720px; margin: 0 auto; padding: 1rem 1.5rem 5rem; }
    header { border-bottom: 1px solid var(--border); padding-bottom: 1.5rem; margin-bottom: 2rem; }
    h1 { font-size: 2.4rem; line-height: 1.15; margin: .5rem 0 .75rem; letter-spacing: -.01em; }
    .meta {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--muted); font-size: .9rem; display: flex; flex-wrap: wrap; gap: 1rem;
    }
    .meta .pill { background: var(--panel); border: 1px solid var(--border); border-radius: 999px; padding: .15rem .7rem; }
    article p { margin: 0 0 1.3rem; font-size: 1.12rem; }
    article p:first-of-type::first-letter {
      font-size: 3.1rem; line-height: .8; float: left; padding: .1rem .6rem 0 0; color: var(--accent); font-weight: 700;
    }
    footer {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--muted); font-size: .85rem; text-align: center; margin-top: 3.5rem;
      border-top: 1px solid var(--border); padding-top: 1.5rem;
    }
    footer a { color: var(--accent); }
  </style>
</head>
<body>
  <nav class="bar"><a href="../index.html">← Auto-Writer</a> &nbsp;·&nbsp; <a href="index.html">Story library</a></nav>
  <div class="wrap">
    <header>
      <h1>{{TITLE}}</h1>
      <div class="meta">
        <span class="pill">Reading level: {{READING_LEVEL}}</span>
        <span class="pill">≈ {{WORD_COUNT}} words</span>
        <span class="pill">{{DATE}}</span>
      </div>
    </header>

    <article>
      {{BODY}}
    </article>

    <footer>
      Written by <a href="../index.html">Auto-Writer</a> · Reading level {{READING_LEVEL}}
    </footer>
  </div>
</body>
</html>
